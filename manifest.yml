# NOTE: This is an example manifest for reference. For production use,
# prefer the Helm chart (helm/draino/) which manages naming, labels,
# and version upgrades automatically.
#
# The Helm chart defaults to naming resources "<release>-draino" (via
# _helpers.tpl), which differs from the hardcoded "draino" names below.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels: {component: draino}
  name: draino
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels: {component: draino}
  name: draino
rules:
- apiGroups: ['']
  resources: [events]
  verbs: [create, patch, update]
- apiGroups: ['']
  resources: [nodes]
  verbs: [get, watch, list, update]
- apiGroups: ['']
  resources: [nodes/status]
  verbs: [update]
- apiGroups: ['']
  resources: [pods]
  verbs: [get, watch, list]
- apiGroups: ['']
  resources: [pods/eviction]
  verbs: [create]
- apiGroups: [apps]
  resources: [daemonsets]
  verbs: [get, watch, list]
- apiGroups: [apps]
  resources: [statefulsets]
  verbs: [get]
- apiGroups: [coordination.k8s.io]
  resources: [leases]
  verbs: [get, create, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels: {component: draino}
  name: draino
roleRef: {apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: draino}
subjects:
- {kind: ServiceAccount, name: draino, namespace: kube-system}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels: {component: draino}
  name: draino
  namespace: kube-system
spec:
  # Draino uses leader election via a Lease resource in the configured namespace
  # (default: kube-system). Only the leader instance processes nodes.
  replicas: 1
  selector:
    matchLabels: {component: draino}
  template:
    metadata:
      labels: {component: draino}
      name: draino
    spec:
      securityContext:
        fsGroup: 101
        runAsGroup: 101
        runAsNonRoot: true
        runAsUser: 100
      containers:
        # You'll want to change these labels and conditions to suit your deployment.
        - name: draino
          command:
            - /draino
            - --dry-run
            - --node-label-expr=metadata.labels['draino-enabled'] == 'true'
            - BadCondition
            - ReallyBadCondition
          image: ghcr.io/maskshell/draino:sha-<commit>
          livenessProbe:
            httpGet: {path: /healthz, port: 10002}
            initialDelaySeconds: 30
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      serviceAccountName: draino
